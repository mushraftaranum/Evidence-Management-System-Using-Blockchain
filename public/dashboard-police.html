<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Police Dashboard - TrustChain-EMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">

    <!-- Web3 -->
    <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
</head>

<body>

<div class="dashboard-container">

    <!-- Header -->
    <header>
        <h1>TrustChain-EMS</h1>
        <div class="user-info">
            <span id="user-name"></span>
            <span id="user-role">Police</span>
            <button id="logout-btn" class="btn">Logout</button>
        </div>
    </header>

    <div class="dashboard-content">

        <!-- Sidebar -->
        <div class="sidebar">
            <button id="add-evidence-nav" class="nav-btn active">Add Evidence</button>
            <button id="view-evidence-nav" class="nav-btn">View Evidence</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">

            <!-- Add Evidence Section -->
            <div id="add-evidence-section" class="dashboard-section">
                <h2>Add New Evidence</h2>

                <form id="evidence-form">

                    <div class="form-group">
                        <label>Evidence ID:</label>
                        <input type="text" id="evidence-id" required>
                    </div>

                    <div class="form-group">
                        <label>Case Number:</label>
                        <input type="text" id="case-number" required>
                    </div>

                    <div class="form-group">
                        <label>Location:</label>
                        <input type="text" id="location" required>
                    </div>

                    <div class="form-group">
                        <label>Crime Description:</label>
                        <textarea id="crime-description" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Evidence Type:</label>
                        <select id="evidence-type" required>
                            <option value="">Select Type</option>
                            <option value="Audio">Audio</option>
                            <option value="Video">Video</option>
                            <option value="Document">Document</option>
                            <option value="Image">Image</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Upload File:</label>
                        <input type="file" id="evidence-file" required>
                    </div>

                    <div class="form-group">
                        <label>Evidence Password:</label>
                        <input type="password" id="evidence-password" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn success-btn">
                            Upload Evidence
                        </button>
                        <button type="reset" class="btn secondary-btn">
                            Clear
                        </button>
                    </div>

                </form>

                <div id="upload-status" class="message"></div>
            </div>

            <!-- View Evidence Section -->
            <div id="view-evidence-section" class="dashboard-section hidden">
                <h2>View Evidence</h2>

                <div class="evidence-list" id="evidence-list">
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Police JS -->
<script src="police-dashboard.js"></script>

<script>
// Basic login protection
document.addEventListener("DOMContentLoaded", function () {

    const user = JSON.parse(localStorage.getItem("blockchainEvidenceUser"));

    if (!user) {
        alert("Please login first");
        window.location.href = "index.html";
        return;
    }

    document.getElementById("user-name").innerText = user.name;
    document.getElementById("user-role").innerText = user.role;

    // Logout
    document.getElementById("logout-btn").addEventListener("click", function () {
        localStorage.removeItem("blockchainEvidenceUser");
        window.location.href = "index.html";
    });

    // Navigation
    document.getElementById("add-evidence-nav").addEventListener("click", function () {
        document.getElementById("add-evidence-section").classList.remove("hidden");
        document.getElementById("view-evidence-section").classList.add("hidden");
    });

    document.getElementById("view-evidence-nav").addEventListener("click", function () {
        document.getElementById("add-evidence-section").classList.add("hidden");
        document.getElementById("view-evidence-section").classList.remove("hidden");
    });

});
</script>

</body>
</html>
